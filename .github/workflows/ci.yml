name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit -p packages/shared/tsconfig.json && npx tsc --noEmit -p packages/tools/tsconfig.json && npx tsc --noEmit -p packages/server/tsconfig.json
